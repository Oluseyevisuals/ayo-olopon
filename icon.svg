  <circle cx="300" cy="236" r="22" fill="#0d0400" stroke="#6a3c18" stroke-width="3"/>
  <circle cx="364" cy="236" r="22" fill="#0d0400" stroke="#6a3c18" stroke-width="3"/>
  <circle cx="428" cy="236" r="22" fill="#0d0400" stroke="#6a3c18" stroke-width="3"/>
  <!-- 6 pits bottom row -->
  <circle cx="108" cy="316" r="22" fill="#0d0400" stroke="#6a3c18" stroke-width="3"/>
  <circle cx="172" cy="316" r="22" fill="#0d0400" stroke="#6a3c18" stroke-width="3"/>
