name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licences and install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>&1 | tail -3

      - name: Install Bubblewrap core
        run: |
          npm install -g @bubblewrap/cli
          npm install @bubblewrap/core @bubblewrap/cli

      - name: Restore original keystore
        run: |
          mkdir -p twa-build
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa-build/signing.keystore
          ls -lh twa-build/signing.keystore

      - name: Generate Android TWA project (non-interactive)
        run: |
          cat > generate.js << 'JSEOF'
          const {TwaManifest, TwaGenerator, Config, ConsoleLog} = require('@bubblewrap/core');
          const path = require('path');

          async function run() {
            const log = new ConsoleLog('generate');
            const config = new Config(process.env.JAVA_HOME, process.env.ANDROID_SDK_ROOT);

            const keystorePath = path.resolve('twa-build/signing.keystore');

            const manifestJson = {
              packageId: 'com.oluseyevisuals.ayoolopon',
              host: 'oluseyevisuals.github.io',
              name: 'Ayo Olopon',
              launcherName: 'Ayo',
              display: 'standalone',
              orientation: 'portrait',
              themeColor: '#c9941e',
              navigationColor: '#c9941e',
              navigationColorDark: '#071510',
              navigationDividerColor: '#c9941e',
              navigationDividerColorDark: '#071510',
              backgroundColor: '#071510',
              enableNotifications: false,
              startUrl: '/ayo-olopon/index.html',
              iconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              maskableIconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              appVersion: '4.0',
              appVersionCode: 4,
              signingKey: { path: keystorePath, alias: 'my-key-alias' },
              splashScreenFadeOutDuration: 300,
              enableSiteSettingsShortcut: true,
              isChromeOSOnly: false,
              isMetaQuest: false,
              fullScopeUrl: 'https://oluseyevisuals.github.io/ayo-olopon/',
              minSdkVersion: 21,
              webManifestUrl: 'https://oluseyevisuals.github.io/ayo-olopon/manifest.json',
              shortcuts: [],
              generatorApp: 'bubblewrap-cli',
            };

            const twaManifest = new TwaManifest(manifestJson);
            const generator = new TwaGenerator();
            await generator.createTwaProject(path.resolve('twa-build'), twaManifest, log);
            console.log('TWA project generated OK');
          }

          run().catch(e => { console.error(e.message || e); process.exit(1); });
          JSEOF
          node generate.js

      - name: Add AdMob SDK dependency
        run: |
          sed -i "s/dependencies {/dependencies {\n    implementation 'com.google.android.gms:play-services-ads:23.0.0'/" twa-build/app/build.gradle
          echo "AdMob dependency added"

      - name: Add AdMob App ID to AndroidManifest
        run: |
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-4833316065052048~9502679052"/>\n        </application>|' twa-build/app/src/main/AndroidManifest.xml
          sed -i 's|<manifest|<manifest\n    xmlns:android="http://schemas.android.com/apk/res/android"|' twa-build/app/src/main/AndroidManifest.xml || true
          sed -i 's|</manifest>|    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n</manifest>|' twa-build/app/src/main/AndroidManifest.xml
          echo "AdMob App ID and AD_ID permission added to manifest"

      - name: Create MainActivity with AdMob interstitial
        run: |
          mkdir -p twa-build/app/src/main/java/com/oluseyevisuals/ayoolopon
          cat > twa-build/app/src/main/java/com/oluseyevisuals/ayoolopon/MainActivity.java << 'EOF'
          package com.oluseyevisuals.ayoolopon;

          import android.os.Bundle;
          import androidx.annotation.NonNull;
          import com.google.android.gms.ads.MobileAds;
          import com.google.android.gms.ads.interstitial.InterstitialAd;
          import com.google.android.gms.ads.interstitial.InterstitialAdLoadCallback;
          import com.google.android.gms.ads.AdRequest;
          import com.google.android.gms.ads.LoadAdError;
          import com.google.android.gms.ads.FullScreenContentCallback;
          import com.google.androidbrowserhelper.trusted.LauncherActivity;

          public class MainActivity extends LauncherActivity {
              private InterstitialAd mInterstitialAd;
              private long sessionStartTime;
              private boolean adShownThisSession = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  sessionStartTime = System.currentTimeMillis();
                  MobileAds.initialize(this, initializationStatus -> loadInterstitialAd());
              }

              private void loadInterstitialAd() {
                  AdRequest adRequest = new AdRequest.Builder().build();
                  InterstitialAd.load(this,
                      "ca-app-pub-4833316065052048/4058780689",
                      adRequest,
                      new InterstitialAdLoadCallback() {
                          @Override
                          public void onAdLoaded(@NonNull InterstitialAd interstitialAd) {
                              mInterstitialAd = interstitialAd;
                          }
                          @Override
                          public void onAdFailedToLoad(@NonNull LoadAdError loadAdError) {
                              mInterstitialAd = null;
                          }
                      });
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  long elapsed = System.currentTimeMillis() - sessionStartTime;
                  // Show ad after 2 minutes of play, once per session
                  if (!adShownThisSession && elapsed > 120000 && mInterstitialAd != null) {
                      adShownThisSession = true;
                      mInterstitialAd.setFullScreenContentCallback(new FullScreenContentCallback() {
                          @Override
                          public void onAdDismissedFullScreenContent() {
                              mInterstitialAd = null;
                              adShownThisSession = false;
                              loadInterstitialAd();
                          }
                      });
                      mInterstitialAd.show(this);
                  }
              }
          }
          EOF
          echo "MainActivity.java created"

      - name: Update AndroidManifest to use MainActivity
        run: |
          sed -i 's|com.google.androidbrowserhelper.trusted.LauncherActivity|com.oluseyevisuals.ayoolopon.MainActivity|g' twa-build/app/src/main/AndroidManifest.xml
          echo "AndroidManifest updated to use MainActivity"

      - name: Inject signing config into build.gradle
        run: |
          KEYSTORE_PATH="$(pwd)/twa-build/signing.keystore"
          cat >> twa-build/app/build.gradle << EOF

          android.signingConfigs {
            release {
              storeFile file('$KEYSTORE_PATH')
              storePassword 'sc3JmrlTX8lG'
              keyAlias 'my-key-alias'
              keyPassword 'sc3JmrlTX8lG'
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF
          echo "build.gradle updated"

      - name: Build AAB with Gradle
        working-directory: twa-build
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease 2>&1 | tail -30
          echo "--- output files ---"
          find . -name "*.aab" 2>/dev/null

      - name: Collect output files
        run: |
          mkdir -p output
          find twa-build -name "*.aab" -exec cp {} output/ \; 2>/dev/null || true
          ls -lh output/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v4-aab
          path: output/
          if-no-files-found: warn
