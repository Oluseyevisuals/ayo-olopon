name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licences and install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" --no_https 2>&1 | tail -5

      - name: Install Bubblewrap core
        run: npm install -g @bubblewrap/cli @bubblewrap/core

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init TWA project (non-interactive)
        run: |
          mkdir -p twa-build
          cd twa-build
          # Use bubblewrap init with manifest URL, answer all prompts with defaults
          printf '\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | \
            bubblewrap init \
              --manifest "https://oluseyevisuals.github.io/ayo-olopon/manifest.json" \
              --skipPwaValidation 2>&1 | tail -20

      - name: Override version code to 2
        run: |
          cd twa-build
          # Set version code in twa-manifest.json
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.appVersionCode = 2;
            m.appVersion = '2.0';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Version set to', m.appVersion, 'code', m.appVersionCode);
          "

      - name: Build AAB
        run: |
          cd twa-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPassphrase android \
            --signingKeyAliasPassphrase android 2>&1
          echo "--- searching for output files ---"
          find . -name "*.aab" -o -name "*.apk" 2>/dev/null | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v2-aab
          path: |
            twa-build/**/*.aab
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v2-apk
          path: |
            twa-build/**/*.apk
          if-no-files-found: warn
