name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licences and install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>&1 | tail -3

      - name: Install Bubblewrap core
        run: npm install -g @bubblewrap/core @bubblewrap/cli

      - name: Generate Android TWA project (non-interactive)
        run: |
          mkdir -p twa-build
          cat > generate.js << 'JSEOF'
          const {TwaManifest, TwaGenerator, Config, Log} = require('@bubblewrap/core');
          const path = require('path');

          async function run() {
            const log = new Log('generate');
            const config = new Config(process.env.JAVA_HOME, process.env.ANDROID_SDK_ROOT);

            const manifestJson = {
              packageId: 'com.oluseyevisuals.ayoolopon',
              host: 'oluseyevisuals.github.io',
              name: 'Ayo Olopon',
              launcherName: 'Ayo',
              display: 'standalone',
              orientation: 'portrait',
              themeColor: { r: 201, g: 148, b: 30, a: 255 },
              navigationColor: { r: 201, g: 148, b: 30, a: 255 },
              navigationColorDark: { r: 7, g: 21, b: 16, a: 255 },
              navigationDividerColor: { r: 201, g: 148, b: 30, a: 255 },
              navigationDividerColorDark: { r: 7, g: 21, b: 16, a: 255 },
              backgroundColor: { r: 7, g: 21, b: 16, a: 255 },
              enableNotifications: false,
              startUrl: '/ayo-olopon/index.html',
              iconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              maskableIconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              appVersion: '2.0',
              appVersionCode: 2,
              signingKey: { path: path.resolve('twa-build/android.keystore'), alias: 'android' },
              splashScreenFadeOutDuration: 300,
              enableSiteSettingsShortcut: true,
              isChromeOSOnly: false,
              isMetaQuest: false,
              fullScopeUrl: 'https://oluseyevisuals.github.io/ayo-olopon/',
              minSdkVersion: 19,
              webManifestUrl: 'https://oluseyevisuals.github.io/ayo-olopon/manifest.json',
              shortcuts: [],
              generatorApp: 'bubblewrap-cli',
            };

            const twaManifest = new TwaManifest(manifestJson);
            const generator = new TwaGenerator();
            await generator.createTwaProject(path.resolve('twa-build'), twaManifest, log);
            console.log('TWA project generated OK');
          }

          run().catch(e => { console.error(e.message || e); process.exit(1); });
          JSEOF
          node generate.js

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore twa-build/android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Olu, OU=Oluseyevisuals, O=Oluseyevisuals, L=London, ST=England, C=GB"

      - name: Build AAB with Gradle
        run: |
          cd twa-build
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PsigningKeyPassword=android \
            -PsigningKeyAliasPassword=android 2>&1 | tail -30
          echo "--- output files ---"
          find . -name "*.aab" 2>/dev/null

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v2-aab
          path: twa-build/**/*.aab
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v2-apk
          path: twa-build/**/*.apk
          if-no-files-found: warn
