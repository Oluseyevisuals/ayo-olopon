name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licences and install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>&1 | tail -3

      - name: Install Bubblewrap core
        run: |
          npm install -g @bubblewrap/cli
          npm install @bubblewrap/core @bubblewrap/cli

      - name: Generate Android TWA project (non-interactive)
        run: |
          mkdir -p twa-build
          cat > generate.js << 'JSEOF'
          const {TwaManifest, TwaGenerator, Config, ConsoleLog} = require('@bubblewrap/core');
          const path = require('path');

          async function run() {
            const log = new ConsoleLog('generate');
            const config = new Config(process.env.JAVA_HOME, process.env.ANDROID_SDK_ROOT);

            const manifestJson = {
              packageId: 'com.oluseyevisuals.ayoolopon',
              host: 'oluseyevisuals.github.io',
              name: 'Ayo Olopon',
              launcherName: 'Ayo',
              display: 'standalone',
              orientation: 'portrait',
              themeColor: '#c9941e',
              navigationColor: '#c9941e',
              navigationColorDark: '#071510',
              navigationDividerColor: '#c9941e',
              navigationDividerColorDark: '#071510',
              backgroundColor: '#071510',
              enableNotifications: false,
              startUrl: '/ayo-olopon/index.html',
              iconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              maskableIconUrl: 'https://oluseyevisuals.github.io/ayo-olopon/icon-512.png',
              appVersion: '2.0',
              appVersionCode: 2,
              signingKey: { path: path.resolve('twa-build/android.keystore'), alias: 'android' },
              splashScreenFadeOutDuration: 300,
              enableSiteSettingsShortcut: true,
              isChromeOSOnly: false,
              isMetaQuest: false,
              fullScopeUrl: 'https://oluseyevisuals.github.io/ayo-olopon/',
              minSdkVersion: 21,
              webManifestUrl: 'https://oluseyevisuals.github.io/ayo-olopon/manifest.json',
              shortcuts: [],
              generatorApp: 'bubblewrap-cli',
            };

            const twaManifest = new TwaManifest(manifestJson);
            const generator = new TwaGenerator();
            await generator.createTwaProject(path.resolve('twa-build'), twaManifest, log);
            console.log('TWA project generated OK');
          }

          run().catch(e => { console.error(e.message || e); process.exit(1); });
          JSEOF
          node generate.js

      - name: Restore original keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa-build/signing.keystore
          ls -lh twa-build/signing.keystore

      - name: Build AAB with Gradle (signed with original keystore)
        run: |
          cd twa-build
          chmod +x gradlew
          # Update twa-manifest to use the original keystore
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.signingKey = { path: 'signing.keystore', alias: 'my-key-alias' };
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "
          ./gradlew bundleRelease \
            -PsigningKeyPassword=sc3JmrlTX8lG \
            -PsigningKeyAliasPassword=sc3JmrlTX8lG 2>&1 | tail -30
          echo "--- searching all output files ---"
          find . -name "*.aab" 2>/dev/null

      - name: Collect output files
        run: |
          mkdir -p output
          cp twa-build/app-release-signed.aab output/ 2>/dev/null || \
            find twa-build -name "*.aab" -exec cp {} output/ \; 2>/dev/null || true
          ls -lh output/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ayo-olopon-v2-aab
          path: output/
          if-no-files-found: warn
